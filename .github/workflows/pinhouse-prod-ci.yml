name: PinHouse-FE 운영용 CI 파이프라인

env:
  # 공통 설정
  NODE_VERSION: '22.x'
  BRANCH_NAME: ${{ github.ref_name }}
  ENV_TYPE: '🚀 운영(PROD)'

  # GCP 설정
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  GCP_ARTIFACT_REPO: pinhouse-prod-fe
  IMAGE_NAME: pinhouse-web
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

  # Discord 설정
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_AVATAR_URL: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

on:
  push:
    branches:
      - main
      - chore/#521-test

# 권한
permissions:
  contents: read
  id-token: write

# 동시 실행 파이프라인 조절
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GitHub Environment 기반, Docker 이미지 빌드 및 GCP Artifact Registry 업로드
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    environment: PinHouse_prod
    outputs:
      image_tag: ${{ steps.timestamp.outputs.image_tag }}
      full_image: ${{ steps.timestamp.outputs.full_image }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증 (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      - name: gcloud CLI 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: Artifact Registry 인증
        run: |
          gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY }}

      - name: 타임스탬프 및 이미지 태그 생성
        id: timestamp
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="$(date +'%Y%m%d_%H%M%S')-$SHORT_SHA"
          FULL_IMAGE="${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 Artifact Registry 푸시
        env:
          IMAGE_TAG: ${{ steps.timestamp.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.timestamp.outputs.full_image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Docker-pinhouse-file
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.FULL_IMAGE }}
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_OAUTH2=${{ secrets.NEXT_PUBLIC_OAUTH2 }}
          secrets: |
            NPM_TOKEN=${{ secrets.NPM_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. CI 결과 알림
  notify-ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [build]
    environment: PinHouse_prod
    if: always()
    steps:
      - name: 운영용 Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ needs.build.result == 'success' && 'success' || 'failure' }}
          title: "PinHouse 운영용 CI 결과 [${{ needs.build.result == 'success' && '✅성공' || '❌실패' }}]"
          description: |
            **커밋 메시지**: ${{ github.event.head_commit.message }}
            **브랜치**: `${{ env.BRANCH_NAME }}`
            **환경**: ${{ env.ENV_TYPE }}

            **상세 결과**:
            - Build: ${{ needs.build.result == 'success' && ' ✅' || ' ❌' }}

            **Docker 이미지**: `${{ needs.build.outputs.image_tag }}`
            **이미지 경로**: `${{ needs.build.outputs.full_image }}`
            
            **다음 단계**: ArgoCD에서 배포가 진행됩니다. 배포 결과는 ArgoCD 알림을 확인해주세요.
            
            **링크**: [커밋 확인하기](${{ github.event.repository.html_url }}/commit/${{ github.sha }})

          color: "${{ needs.build.result == 'success' && 65280 || 16711680 }}"
          username: PinHouse Production FE CI Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}
