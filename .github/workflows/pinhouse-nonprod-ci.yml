name: PinHouse-FE 비운영용 CI 파이프라인

env:
  # 공통 설정
  NODE_VERSION: '22.x'
  BRANCH_NAME: ${{ github.ref_name }}
  IS_STAGING: ${{ startsWith(github.ref_name, 'release/') }}
  ENV_TYPE: ${{ startsWith(github.ref_name, 'release/') && '🧪 스테이징(STAGING)' || '🛠️ 개발(DEV)' }}

  # GCP 설정
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  GCP_ARTIFACT_REPO: pinhouse-nonprod-fe
  IMAGE_NAME: pinhouse-web
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

  # Discord 설정
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_NON_PROD_URL }}
  DISCORD_AVATAR_URL: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

on:
  push:
    branches:
      - develop
      - release/*

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. 통합 품질 검사 (Lint + Prettier + TypeCheck)
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: ${{ !github.event.created }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 노드 JS 설치
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 통합 코드 검사
        run: pnpm check

  # 2. Docker 이미지 빌드 및 GCP Artifact Registry 업로드
  build:
    needs: [lint]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      image_tag: ${{ steps.timestamp.outputs.image_tag }}
      full_image: ${{ steps.timestamp.outputs.full_image }}
      env_type: ${{ steps.timestamp.outputs.env_type }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증 (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      - name: gcloud CLI 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: Artifact Registry 인증
        run: |
          gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY }}

      - name: 타임스탬프 및 이미지 태그 생성
        id: timestamp
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="$(date +'%Y%m%d_%H%M%S')-$SHORT_SHA"

          # 환경 타입 결정
          if [[ "${{ env.BRANCH_NAME }}" == release/* ]]; then
            ENV_TAG="stg"
          else
            ENV_TAG="dev"
          fi

          FULL_IMAGE="${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "env_type=$ENV_TAG" >> $GITHUB_OUTPUT

      - name: 환경 변수 파일 생성
        run: |
          if [[ "${{ env.BRANCH_NAME }}" == release/* ]]; then
            echo "${{ secrets.ENV_FILE_STAGING }}" > .env.production
            ENV_NAME="staging"
          else
            echo "${{ secrets.ENV_FILE_DEV }}" > .env.production
            ENV_NAME="dev"
          fi

          echo "📝 빌드용 환경 변수 파일 생성 완료"
          echo "환경: $ENV_NAME"
          echo "파일: .env.production"
          ENV_VAR_COUNT=$(grep -c '^[A-Za-z_][A-Za-z0-9_]*=' .env.production || true)
          echo "변수 개수: $ENV_VAR_COUNT"

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 Artifact Registry 푸시
        env:
          IMAGE_TAG: ${{ steps.timestamp.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.timestamp.outputs.full_image }}
          ENV_TAG: ${{ steps.timestamp.outputs.env_type }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.FULL_IMAGE }}
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ env.ENV_TAG }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # 3. CI 결과 알림
  notify-ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [lint, build]
    if: always() && !github.event.created
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ (needs.lint.result == 'success' && needs.build.result == 'success') && 'success' || 'failure' }}
          title: "PinHouse ${{ env.BRANCH_NAME }} CI 결과 [${{ (needs.lint.result == 'success' && needs.build.result == 'success') && '✅성공' || '❌실패' }}]"
          description: |
            **브랜치**: `${{ env.BRANCH_NAME }}`
            **환경**: ${{ env.ENV_TYPE }}

            **📊 상세 결과**:
            - Lint/Type: ${{ needs.lint.result == 'success' && ' ✅' || ' ❌' }}
            - Build: ${{ needs.build.result == 'success' && ' ✅' || ' ❌' }}

            **🐳 Docker 이미지**: `${{ needs.build.outputs.image_tag }}`
            **📦 이미지 경로**: `${{ needs.build.outputs.full_image }}`

            **📌 다음 단계**: ArgoCD에서 배포가 진행됩니다. 배포 결과는 ArgoCD 알림을 확인해주세요.

            **🔗 링크**: [커밋 확인하기](${{ github.event.repository.html_url }}/commit/${{ github.sha }})

          color: "${{ (needs.lint.result == 'success' && needs.build.result == 'success') && 65280 || 16711680 }}"
          username: PinHouse NonProd FE CI Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}
